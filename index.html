<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🏆 Чемпионат мира 2026</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 50%, #2e7d32 100%);
            min-height: 100vh;
            padding: 20px 16px;
            color: #ffffff;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #ff1744 0%, #d50000 50%, #b71c1c 100%);
            padding: 20px 32px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 40px rgba(255, 23, 68, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header::before {
            content: '⚽';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(15deg);
        }
        .header-left h1 {
            font-size: 2rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
        }
        .header-left .hosts {
            color: #ffcdd2;
            font-weight: 700;
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .header-flags {
            display: flex;
            gap: 12px;
            font-size: 2.2rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 18px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: #2196F3;
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.4);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .schedule-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .schedule-filters .filter-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .schedule-filters .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .schedule-filters .filter-btn.active {
            background: #2196F3;
            color: #ffffff;
            border-color: transparent;
        }
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .group-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .group-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .group-header {
            background: linear-gradient(135deg, #ff1744, #d50000);
            color: #ffffff;
            padding: 14px 20px;
            font-weight: 800;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 1px;
        }
        .group-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            table-layout: fixed;
        }
        .group-table th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 3px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .group-table td {
            padding: 7px 3px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            vertical-align: middle;
        }
        .group-table .team-name {
            text-align: left;
            padding-left: 10px;
            font-weight: 500;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }
        .group-table .team-name:hover {
            color: #ffeb3b;
        }
        .group-table .team-name .flag {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .group-table .team-name .team-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .group-table .team-name .expand-icon {
            margin-left: auto;
            font-size: 0.7rem;
            color: #4fc3f7;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .group-table .team-name .expand-icon.active {
            transform: rotate(180deg);
            color: #4fc3f7;
        }
        .group-table tr.top-two td:first-child {
            border-left: 4px solid #2e7d32;
        }
        .group-table tr.top-two {
            background: rgba(46, 125, 50, 0.15);
        }
        .group-table tr.third-best td:first-child {
            border-left: 4px solid #f9a825;
        }
        .group-table tr.third-best {
            background: rgba(249, 168, 37, 0.06);
        }
        .group-table tr.fourth-place td:first-child {
            border-left: 4px solid #ff1744;
        }
        .group-table tr.fourth-place {
            background: rgba(255, 23, 68, 0.1);
        }
        .group-table tr.third-not-qualified td:first-child {
            border-left: 4px solid #ff1744;
        }
        .group-table tr.third-not-qualified {
            background: rgba(255, 23, 68, 0.08);
        }
        .group-table .points {
            font-weight: 800;
            color: #ffeb3b;
            font-size: 1.05rem;
        }
        .team-detail-row {
            display: none;
            background: rgba(255, 255, 255, 0.03);
        }
        .team-detail-row.active {
            display: table-row;
        }
        .team-detail-row td {
            padding: 6px 10px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .team-matches-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0;
            width: 100%;
        }
        .team-match-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.8rem;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .team-match-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 235, 59, 0.3);
        }
        .team-match-item .match-flag {
            font-size: 1.1rem;
        }
        .team-match-item .match-score {
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            color: #ffeb3b;
        }
        .team-match-item .match-score.empty-score {
            color: rgba(255, 255, 255, 0.15);
        }
        .team-match-item .match-date {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.6rem;
            margin-left: auto;
        }
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .schedule-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: 0.3s;
        }
        .schedule-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 235, 59, 0.2);
        }
        .schedule-card .group-tag {
            display: inline-block;
            background: linear-gradient(135deg, #ff1744, #d50000);
            color: #ffffff;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .schedule-card .match-datetime {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }
        .schedule-card .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 4px 0;
            gap: 4px;
        }
        .schedule-card .match-teams .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
            max-width: 38%;
        }
        .schedule-card .match-teams .team .flag {
            font-size: 1.4rem;
            line-height: 1.2;
        }
        .schedule-card .match-teams .team .team-name {
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.15;
            max-width: 100%;
        }
        .schedule-card .match-teams .score-center {
            font-size: 1.3rem;
            font-weight: 800;
            min-width: 100px;
            flex-shrink: 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .schedule-card .match-teams .score-center .red-card-badge {
            flex-shrink: 0;
        }
        .schedule-card .match-teams .score-center.played {
            color: #ffeb3b;
        }
        .schedule-card .match-teams .score-center.empty {
            color: rgba(255, 255, 255, 0.1);
        }
        .schedule-card .match-status {
            font-size: 0.7rem;
            text-align: center;
            padding-top: 4px;
            font-weight: 600;
        }
        .schedule-card .match-status.played {
            color: #ffeb3b;
        }
        .schedule-card .match-status.waiting {
            color: rgba(255, 255, 255, 0.3);
        }
        .match-detail-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .match-detail-overlay.active {
            display: flex;
        }
        .match-detail-modal {
            background: linear-gradient(145deg, #1a3a1a, #0d2b0d);
            border-radius: 24px;
            max-width: 640px;
            width: 100%;
            padding: 28px 32px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }
        .match-detail-modal .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 1.8rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            border: none;
            background: none;
            transition: 0.3s;
        }
        .match-detail-modal .close-btn:hover {
            color: #ffeb3b;
            transform: rotate(90deg);
        }
        .match-detail-modal .detail-header {
            text-align: center;
            margin-bottom: 10px;
        }
        .match-detail-modal .detail-header .group-badge {
            background: linear-gradient(135deg, #ff1744, #d50000);
            color: #ffffff;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .match-detail-modal .detail-header .datetime {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 3px;
        }
        .match-detail-modal .detail-score {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0 4px 0;
            gap: 8px;
        }
        .match-detail-modal .detail-score .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            max-width: 32%;
        }
        .match-detail-modal .detail-score .team-block .flag {
            font-size: 1.8rem;
            line-height: 1.2;
        }
        .match-detail-modal .detail-score .score-big {
            font-size: 2.6rem;
            font-weight: 900;
            color: #ffeb3b;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }
        .match-detail-modal .detail-score .score-big.empty {
            color: rgba(255, 255, 255, 0.1);
        }
        .match-detail-modal .detail-scorers {
            display: flex;
            justify-content: space-between;
            padding: 6px 0 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 10px;
            gap: 10px;
        }
        .match-detail-modal .detail-scorers .scorers-col {
            flex: 1;
            text-align: left;
        }
        .match-detail-modal .detail-scorers .scorers-col.right {
            text-align: right;
        }
        .match-detail-modal .detail-scorers .scorers-col .goal {
            display: block;
            font-size: 0.78rem;
            padding: 1px 0;
        }
        .match-detail-modal .detail-scorers .scorers-col .goal .minute {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }
        .match-detail-modal .detail-scorers .scorers-col.home-col .goal {
            color: #ffeb3b;
        }
        .match-detail-modal .detail-scorers .scorers-col.away-col .goal {
            color: #ff1744;
        }
        .match-detail-modal .detail-scorers .scorers-empty {
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
        }
        .match-detail-modal .detail-scorers .scorers-divider {
            width: 1px;
            background: rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .match-detail-modal .stat-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .match-detail-modal .stat-row .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
            text-align: center;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .match-detail-modal .stat-row .stat-label .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            font-style: normal;
        }
        .match-detail-modal .stat-row .stat-label .info-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .match-detail-modal .stat-row .stat-label .info-icon .tooltip {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2196F3;
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            max-width: 320px;
            width: fit-content;
            text-align: center;
            border: none;
            pointer-events: none;
            z-index: 2000;
            box-shadow: 0 12px 48px rgba(33, 150, 243, 0.4);
            line-height: 1.5;
            white-space: normal;
        }
        .match-detail-modal .stat-row .stat-label .info-icon .tooltip::after {
            display: none;
        }
        .match-detail-modal .stat-row .stat-label .info-icon:hover .tooltip {
            display: block;
        }
        .match-detail-modal .stat-row .stat-bar-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values {
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
            min-width: 45px;
            text-align: center;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values .home-val {
            color: #ffeb3b;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values .away-val {
            color: #ff1744;
        }
        .match-detail-modal .stat-row .stat-bar {
            height: 7px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            flex: 1;
            display: flex;
        }
        .match-detail-modal .stat-row .stat-bar .bar-home {
            background: linear-gradient(90deg, #2e7d32, #66bb6a);
            height: 100%;
            transition: width 0.5s;
        }
        .match-detail-modal .stat-row .stat-bar .bar-away {
            background: linear-gradient(90deg, #ff1744, #d50000);
            height: 100%;
            transition: width 0.5s;
        }
        .match-detail-modal .not-played {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.1rem;
        }
        .stats-wrap {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .stats-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .stats-wrap th {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.04);
        }
        .stats-wrap td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.85);
        }
        .stats-wrap .points-cell {
            font-weight: 800;
            color: #ffeb3b;
            font-size: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(255, 235, 59, 0.15);
        }
        .stat-card .medal {
            font-size: 1.6rem;
        }
        .stat-card .name {
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 2px;
        }
        .stat-card .sub-info {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 1px;
        }
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffeb3b;
            margin-top: 2px;
        }
        .stat-card .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
            margin-top: 1px;
        }
        .stats-section-title {
            color: #ffeb3b;
            font-size: 1.1rem;
            font-weight: 700;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-section-title:first-of-type {
            margin-top: 0;
        }

        /* Стили для плей-офф */
        .playoff-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }
        .playoff-round-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .playoff-round-filters .round-filter-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .playoff-round-filters .round-filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .playoff-round-filters .round-filter-btn.active {
            background: #2196F3;
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .playoff-round-content {

        // =============================================================
        // ОСНОВНОЙ КОД
        // =============================================================
        const GROUPS = Object.keys(MATCHES_DATA);
        let currentScheduleFilter = 'past';
        let currentRoundFilter = '16';

        function getTeams(groupId) {
            const matches = MATCHES_DATA[groupId] || [];
            const teamSet = new Set();
            matches.forEach(m => { teamSet.add(m.home);
                teamSet.add(m.away); });
            return Array.from(teamSet);
        }

        function computeTable(groupId) {
            const matches = MATCHES_DATA[groupId] || [];
            const teams = getTeams(groupId);
            const stats = {};
            teams.forEach(t => {
                stats[t] = { played: 0, wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 };
            });
            matches.forEach(m => {
                if (m.homeScore === null || m.awayScore === null) return;
                const h = m.home,
                    a = m.away;
                const hs = m.homeScore,
                    as = m.awayScore;
                stats[h].played += 1;
                stats[a].played += 1;
                stats[h].goalsFor += hs;
                stats[h].goalsAgainst += as;
                stats[a].goalsFor += as;
                stats[a].goalsAgainst += hs;
                if (hs > as) { stats[h].wins += 1;
                    stats[a].losses += 1;
                    stats[h].points += 3; } else if (hs < as) { stats[a].wins += 1;
                    stats[h].losses += 1;
                    stats[a].points += 3; } else { stats[h].draws += 1;
                    stats[a].draws += 1;
                    stats[h].points += 1;
                    stats[a].points += 1; }
            });
            const table = teams.map(name => ({
                name,
                ...stats[name],
                goalDiff: stats[name].goalsFor - stats[name].goalsAgainst
            }));
            table.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });
            return table;
        }

        function getQualifiers() {
            const allTables = {};
            const thirdPlaceTeams = [];
            GROUPS.forEach(gid => {
                const table = computeTable(gid);
                allTables[gid] = table;
                if (table.length >= 3) {
                    const third = table[2];
                    thirdPlaceTeams.push({ group: gid, team: third.name, points: third.points, goalDiff: third
                            .goalDiff, goalsFor: third.goalsFor });
                }
            });
            thirdPlaceTeams.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });
            const bestThird = thirdPlaceTeams.slice(0, 8).map(t => t.team);
            const result = {};
            GROUPS.forEach(gid => {
                const table = allTables[gid];
                if (!table) return;
                const qual = [];
                const thirdName = table.length >= 3 ? table[2].name : null;
                if (table.length >= 1) qual.push(table[0].name);
                if (table.length >= 2) qual.push(table[1].name);
                if (thirdName && bestThird.includes(thirdName)) {
                    qual.push(thirdName);
                }
                result[gid] = { qual, bestThird, thirdName };
            });
            return result;
        }

        function getAllMatches() {
            const all = [];
            GROUPS.forEach(gid => {
                MATCHES_DATA[gid].forEach(m => {
                    all.push({ group: gid, ...m });
                });
            });
            // Добавляем матчи плей-офф в расписание
            for (const [round, matches] of Object.entries(PLAYOFF_DATA)) {
                matches.forEach(m => {
                    if (m.home && m.away) {
                        all.push({ group: round, ...m });
                    }
                });
            }
            return all;
        }

        function getTeamMatches(teamName, groupId) {
            const matches = MATCHES_DATA[groupId] || [];
            const teamMatches = [];
            matches.forEach(m => {
                if (m.home === teamName || m.away === teamName) {
                    teamMatches.push(m);
                }
            });
            teamMatches.sort((a, b) => {
                const dateA = new Date(`${a.date}T${a.time}`);
                const dateB = new Date(`${b.date}T${b.time}`);
                return dateA - dateB;
            });
            return teamMatches.slice(-3);
        }

        function getMatchResult(match, teamName) {
            if (match.homeScore === null || match.awayScore === null) {
                return 'waiting';
            }
            const isHome = match.home === teamName;
            const ourScore = isHome ? match.homeScore : match.awayScore;
            const theirScore = isHome ? match.awayScore : match.homeScore;
            if (ourScore > theirScore) return 'win';
            if (ourScore < theirScore) return 'loss';
            return 'draw';
        }

        function getMatchScoreText(match, teamName) {
            if (match.homeScore === null || match.awayScore === null) {
                return '— : —';
            }
            const isHome = match.home === teamName;
            const ourScore = isHome ? match.homeScore : match.awayScore;
            const theirScore = isHome ? match.awayScore : match.homeScore;
            return `${ourScore} : ${theirScore}`;
        }

        function getOpponent(match, teamName) {
            return match.home === teamName ? match.away : match.home;
        }

        function getMatchFlag(teamName) {
            return FLAGS[teamName] || '🏴';

        function getOverallStats() {
            const teamStats = {};
            const allScorers = [];

            // Групповой этап
            GROUPS.forEach(gid => {
                const table = computeTable(gid);
                table.forEach(row => {
                    if (!teamStats[row.name]) {
                        teamStats[row.name] = { name: row.name, group: gid, points: 0, goalsFor: 0,
                            goalsAgainst: 0, goalDiff: 0, played: 0, wins: 0, draws: 0,
                            losses: 0, yellow: 0, red: 0, shotsOn: 0, possessionTotal: 0,
                            possessionCount: 0 };
                    }
                    const s = teamStats[row.name];
                    s.points += row.points;
                    s.goalsFor += row.goalsFor;
                    s.goalsAgainst += row.goalsAgainst;
                    s.goalDiff += row.goalDiff;
                    s.played += row.played;
                    s.wins += row.wins;
                    s.draws += row.draws;
                    s.losses += row.losses;
                });
                MATCHES_DATA[gid].forEach(m => {
                    if (m.scorers) {
                        m.scorers.forEach(s => {
                            if (s.player.toLowerCase().includes('аг') || s.player.includes(
                                    '(АГ)')) {
                                return;
                            }
                            allScorers.push({
                                player: cleanPlayerNameForStats(s.player),
                                team: s.team === 'home' ? m.home : m.away,
                                goals: 1,
                                isPenalty: s.player.toLowerCase().includes('пен') || s.player
                                    .toLowerCase().includes('pen')
                            });
                        });
                    }
                });
                MATCHES_DATA[gid].forEach(m => {
                    if (m.homeScore !== null && m.awayScore !== null) {
                        if (teamStats[m.home]) {
                            teamStats[m.home].yellow += m.yellowHome || 0;
                            teamStats[m.home].red += m.redHome || 0;
                            teamStats[m.home].shotsOn += m.shotsOnHome || 0;
                            teamStats[m.home].possessionTotal += m.possessionHome || 0;
                            teamStats[m.home].possessionCount += 1;
                        }
                        if (teamStats[m.away]) {
                            teamStats[m.away].yellow += m.yellowAway || 0;
                            teamStats[m.away].red += m.redAway || 0;
                            teamStats[m.away].shotsOn += m.shotsOnAway || 0;
                            teamStats[m.away].possessionTotal += m.possessionAway || 0;
                            teamStats[m.away].possessionCount += 1;
                        }
                    }
                });
            });

            // Плей-офф
            for (const [round, matches] of Object.entries(PLAYOFF_DATA)) {
                matches.forEach(m => {
                    if (m.homeScore === null || m.awayScore === null || !m.home || !m.away) return;

                    // Инициализация команд
                    if (!teamStats[m.home]) {
                        teamStats[m.home] = { name: m.home, group: 'ПО', points: 0, goalsFor: 0,
                            goalsAgainst: 0, goalDiff: 0, played: 0, wins: 0, draws: 0,
                            losses: 0, yellow: 0, red: 0, shotsOn: 0, possessionTotal: 0,
                            possessionCount: 0 };
                    }
                    if (!teamStats[m.away]) {
                        teamStats[m.away] = { name: m.away, group: 'ПО', points: 0, goalsFor: 0,
                            goalsAgainst: 0, goalDiff: 0, played: 0, wins: 0, draws: 0,
                            losses: 0, yellow: 0, red: 0, shotsOn: 0, possessionTotal: 0,
                            possessionCount: 0 };
                    }

                    const hs = m.homeScore,
                        as = m.awayScore;
                    teamStats[m.home].played += 1;
                    teamStats[m.away].played += 1;
                    teamStats[m.home].goalsFor += hs;
                    teamStats[m.home].goalsAgainst += as;
                    teamStats[m.away].goalsFor += as;
                    teamStats[m.away].goalsAgainst += hs;

                    if (hs > as) {
                        teamStats[m.home].wins += 1;
                        teamStats[m.away].losses += 1;
                        teamStats[m.home].points += 3;
                    } else if (hs < as) {
                        teamStats[m.away].wins += 1;
                        teamStats[m.home].losses += 1;
                        teamStats[m.away].points += 3;
                    } else {
                        teamStats[m.home].draws += 1;
                        teamStats[m.away].draws += 1;
                        teamStats[m.home].points += 1;
                        teamStats[m.away].points += 1;
                    }

                    teamStats[m.home].yellow += m.yellowHome || 0;
                    teamStats[m.home].red += m.redHome || 0;
                    teamStats[m.away].yellow += m.yellowAway || 0;
                    teamStats[m.away].red += m.redAway || 0;

                    teamStats[m.home].shotsOn += m.shotsOnHome || 0;
                    teamStats[m.away].shotsOn += m.shotsOnAway || 0;

                    if (m.possessionHome) {
                        teamStats[m.home].possessionTotal += m.possessionHome;
                        teamStats[m.home].possessionCount += 1;
                    }
                    if (m.possessionAway) {
                        teamStats[m.away].possessionTotal += m.possessionAway;
                        teamStats[m.away].possessionCount += 1;
                    }

                    if (m.scorers) {
                        m.scorers.forEach(s => {
                            if (s.player.toLowerCase().includes('аг') || s.player.includes('(АГ)')) {
                                return;
                            }
                            allScorers.push({
                                player: cleanPlayerNameForStats(s.player),
                                team: s.team === 'home' ? m.home : m.away,
                                goals: 1,
                                isPenalty: s.player.toLowerCase().includes('пен') || s.player
                                    .toLowerCase().includes('pen')
                            });
                        });
                    }
                });
            }

            // Пересчет goalDiff
            Object.values(teamStats).forEach(s => {
                s.goalDiff = s.goalsFor - s.goalsAgainst;
            });

            const scorerStats = {};
            allScorers.forEach(s => {
                if (!scorerStats[s.player]) {
                    scorerStats[s.player] = { player: s.player, team: s.team, goals: 0, penalties: 0,
                        fromOpen: 0 };
                }
                scorerStats[s.player].goals += s.goals;
                if (s.isPenalty) {
                    scorerStats[s.player].penalties += s.goals;
                } else {
                    scorerStats[s.player].fromOpen += s.goals;
                }
            });
            const topScorers = Object.values(scorerStats).sort((a, b) => b.goals - a.goals).slice(0, 10);

            const teamArr = Object.values(teamStats);
            teamArr.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });

            const bestAttack = [...teamArr].sort((a, b) => b.goalsFor - a.goalsFor).slice(0, 10);
            const bestDefense = [...teamArr].sort((a, b) => a.goalsAgainst - b.goalsAgainst).slice(0, 10);
            const mostYellow = [...teamArr].sort((a, b) => b.yellow - a.yellow).slice(0, 10);
            const mostRed = [...teamArr].sort((a, b) => b.red - a.red).slice(0, 10);
            const mostShots = [...teamArr].sort((a, b) => b.shotsOn - a.shotsOn).slice(0, 10);
            const bestPossession = [...teamArr]
                .filter(t => t.possessionCount > 0)
                .map(t => ({ ...t, avgPossession: t.possessionTotal / t.possessionCount }))
                .sort((a, b) => b.avgPossession - a.avgPossession)
                .slice(0, 10);

            return {
                teams: teamArr,
                topScorers,
                bestAttack,
                bestDefense,
                mostYellow,
                mostRed,
                mostShots,
                bestPossession
            };
        }

        function cleanPlayerNameForStats(name) {
            if (!name) return name;
            return name.replace(/\s*\([^)]*\)\s*$/g, '').trim();
        }

        function displayPlayerName(name) {
            return name;

            const detailRow = document.getElementById(`detail-${groupId}-${teamName.replace(/\s/g, '-')}`);
            const icon = document.getElementById(`icon-${groupId}-${teamName.replace(/\s/g, '-')}`);
            if (detailRow) {
                const isActive = detailRow.classList.contains('active');
                document.querySelectorAll('.team-detail-row.active').forEach(row => {
                    if (row.id !== detailRow.id) {
                        row.classList.remove('active');
                        const iconId = row.id.replace('detail-', 'icon-');
                        const otherIcon = document.getElementById(iconId);
                        if (otherIcon) otherIcon.classList.remove('active');
                    }
                });
                if (isActive) {
                    detailRow.classList.remove('active');
                    if (icon) icon.classList.remove('active');
                } else {
                    detailRow.classList.add('active');
                    if (icon) icon.classList.add('active');
                }
            }
        }

            filteredMatches.sort((a, b) => {

                    const scoreClass = isPlayed ? 'played' : 'empty';

                    const redHome = m.redHome || 0;

                    let redLeft = '';

                            `<span class="red-card-badge" style="display:inline-block;background:#ff1744;color:white;font-weight:800;font-size:0.6rem;padding:0 5px;border-radius:3px;line-height:16px;min-width:16px;text-align:center;margin-left:3px;">${redAway}</span>`;

                    const groupLabel = m.group && m.group.includes('финала') ? m.group : `Группа ${m.group}`;

                    html += `<div class="schedule-card" data-group="${m.group}" data-home="${m.home}" data-away="${m.away}">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <span class="group-tag">${groupLabel}</span>
                                    <span class="match-datetime">${dateFormatted} ${m.time}</span>
                                </div>
                                <div class="match-teams">
                                    <span class="team home">
                                        <span class="flag">${flagHome}</span>
                                        <span class="team-name">${m.home || '—'}</span>
                                    </span>
                                    <span class="score-center ${scoreClass}">
                                        ${redLeft}${scoreText}${redRight}
                                    </span>
                                    <span class="team away">
                                        <span class="flag">${flagAway}</span>
                                        <span class="team-name">${m.away || '—'}</span>
                                    </span>
                                </div>
                                <div class="match-status ${isPlayed ? 'played' : 'waiting'}">${isPlayed ? 'Сыгран' : 'Ожидается'}</div>
                            </div>`;
                });
            }
            container.innerHTML = html;

            document.querySelectorAll('.schedule-card').forEach(el => {
                el.addEventListener('click', function() {
                    const group = this.dataset.group;
                    const home = this.dataset.home;
                    const away = this.dataset.away;
                    let match = null;

                    if (MATCHES_DATA[group]) {
                        match = MATCHES_DATA[group].find(m => m.home === home && m.away === away);
                    }
                    if (!match) {
                        for (const [round, matches] of Object.entries(PLAYOFF_DATA)) {
                            match = matches.find(m => m.home === home && m.away === away);
                            if (match) {
                                openMatchDetail(round, match);
                                return;
                            }
                        }
                    }
                    if (match) openMatchDetail(group, match);
                });
            });
        }

        function openMatchDetail(groupId, match) {
            const overlay = document.getElementById('matchDetailOverlay');
            const content = document.getElementById('matchDetailContent');
            const isPlayed = match.homeScore !== null && match.awayScore !== null;
            const dateFormatted = match.date ? match.date.replace('2026-', '').replace('-', '.') : '—';
            const flagHome = FLAGS[match.home] || '🏴';
            const flagAway = FLAGS[match.away] || '🏴';

            let homeScorersHtml = '';
            let awayScorersHtml = '';
            if (isPlayed && match.scorers && match.scorers.length > 0) {
                const homeGoals = match.scorers.filter(s => s.team === 'home');
                const awayGoals = match.scorers.filter(s => s.team === 'away');
                if (homeGoals.length > 0) {
                    homeScorersHtml = homeGoals.map(s =>
                        `<span class="goal"><span class="minute">${s.minute}'</span> ${displayPlayerName(s.player)}</span>`
                    ).join('');
                }
                if (awayGoals.length > 0) {
                    awayScorersHtml = awayGoals.map(s =>
                        `<span class="goal">${displayPlayerName(s.player)} <span class="minute">${s.minute}'</span></span>`
                    ).join('');
                }
            }

            let roundLabel = groupId;
            if (groupId && groupId.includes('финала')) {
                roundLabel = groupId;
            } else if (groupId && MATCHES_DATA[groupId]) {
                roundLabel = `Группа ${groupId}`;
            }

            let html = `
                <div class="detail-header">
                    <span class="group-badge">${roundLabel}</span>
                    <div class="datetime">${dateFormatted} ${match.time || ''}</div>
                </div>
                <div class="detail-score">
                    <div class="team-block home">
                        <span class="flag">${flagHome}</span>
                    </div>
                    <span class="score-big ${isPlayed ? '' : 'empty'}">${isPlayed ? `${match.homeScore} : ${match.awayScore}` : '— : —'}</span>
                    <div class="team-block away">
                        <span class="flag">${flagAway}</span>
                    </div>
                </div>`;

            if (isPlayed) {
                html += `<div class="detail-scorers">
                            <div class="scorers-col home-col">
                                ${homeScorersHtml || '<span class="scorers-empty">—</span>'}
                            </div>
                            <div class="scorers-divider"></div>
                            <div class="scorers-col right away-col">
                                ${awayScorersHtml || '<span class="scorers-empty">—</span>'}
                            </div>
                        </div>`;
            } else {
                html += `<div class="detail-scorers" style="justify-content:center;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:10px;padding-bottom:12px;">
                            <span style="color:rgba(255,255,255,0.15);font-size:0.8rem;">Матч не сыгран</span>
                        </div>`;
            }

            if (isPlayed) {
                const statsOrder = [
                    { label: 'Владение мячом', home: match.possessionHome || 50, away: match.possessionAway || 50,
                        format: '%' },
                    { label: 'Всего ударов', home: match.shotsTotalHome || 0, away: match.shotsTotalAway || 0,
                        format: '' },
                    { label: 'Удары в створ', home: match.shotsOnHome || 0, away: match.shotsOnAway || 0,
                        format: '' },
                    { label: 'Ожидаемый счёт', home: match.bigChancesHome || 0, away: match.bigChancesAway || 0,
                        format: '', tooltip: 'Сколько голов команда наиграла по качеству созданных моментов' },
                    { label: 'Угловые', home: match.cornersHome || 0, away: match.cornersAway || 0, format: '' },
                    { label: 'Жёлтые карточки', home: match.yellowHome || 0, away: match.yellowAway || 0,
                        format: '' },
                    { label: 'Красные карточки', home: match.redHome || 0, away: match.redAway || 0, format: '' }
                ];

                html += `<div style="margin:8px 0;">`;
                statsOrder.forEach(stat => {
                    const total = stat.home + stat.away;
                    const homePct = total > 0 ? (stat.home / total * 100) : 50;
                    const awayPct = total > 0 ? (stat.away / total * 100) : 50;
                    const homeVal = stat.decimals ? stat.home.toFixed(stat.decimals) : stat.home;
                    const awayVal = stat.decimals ? stat.away.toFixed(stat.decimals) : stat.away;

                    let tooltipHtml = '';
                    if (stat.tooltip) {
                        tooltipHtml = `<span class="info-icon">ⓘ<span class="tooltip">${stat.tooltip}</span></span>`;
                    }

                    html += `<div class="stat-row">
                                <div class="stat-label">${stat.label} ${tooltipHtml}</div>
                                <div class="stat-bar-wrap">
                                    <div class="stat-values"><span class="home-val">${homeVal}${stat.format}</span></div>
                                    <div class="stat-bar">
                                        <div class="bar-home" style="width:${homePct}%;"></div>
                                        <div class="bar-away" style="width:${awayPct}%;"></div>
                                    </div>
                                    <div class="stat-values"><span class="away-val">${awayVal}${stat.format}</span></div>
                                </div>
                            </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="not-played">Матч ещё не сыгран</div>`;
            }

            content.innerHTML = html;
            overlay.classList.add('active');
        }

        // =============================================================
        // ★★★ ПЛЕЙ-ОФФ ★★★
        // =============================================================
        function renderPlayoff() {
            const container = document.getElementById('playoffContainer');

            let roundName = '';
            let matches = [];
            let roundTitle = '';

            switch (currentRoundFilter) {
                case '16':
                    roundName = '1/16 финала';
                    roundTitle = '1/16 финала';
                    matches = PLAYOFF_DATA['1/16 финала'] || [];
                    break;
                case '8':
                    roundName = '1/8 финала';
                    roundTitle = '1/8 финала';
                    matches = PLAYOFF_DATA['1/8 финала'] || [];
                    break;
                case '4':
                    roundName = '1/4 финала';
                    roundTitle = '1/4 финала';
                    matches = PLAYOFF_DATA['1/4 финала'] || [];
                    break;
                case '2':
                    roundName = '1/2 финала';
                    roundTitle = '1/2 финала';
                    matches = PLAYOFF_DATA['1/2 финала'] || [];
                    break;
                case 'third':
                    roundName = 'Матч за 3-е место';
                    roundTitle = 'Матч за 3-е место';
                    matches = PLAYOFF_DATA['Матч за 3-е место'] || [];
                    break;
                case 'final':
                    roundName = 'Финал';
                    roundTitle = 'ФИНАЛ';
                    matches = PLAYOFF_DATA['Финал'] || [];
                    break;
                default:
                    roundName = '1/16 финала';
                    roundTitle = '1/16 финала';
                    matches = PLAYOFF_DATA['1/16 финала'] || [];
            }

            let html = `<div class="playoff-round-content">
                            <div class="playoff-round-title">${roundTitle}</div>
                            <div class="playoff-matches">`;

            if (matches.length === 0) {
                html +=
                    `<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:1.2rem;width:100%;">Нет данных для этого раунда</div>`;
            } else {
                matches.forEach((m) => {
                    const isPlayed = m.homeScore !== null && m.awayScore !== null;
                    const scoreText = isPlayed ? `${m.homeScore} : ${m.awayScore}` : '— : —';
                    const flagHome = FLAGS[m.home] || '🏴';
                    const flagAway = FLAGS[m.away] || '🏴';

                    html += `
                        <div class="playoff-match-card" data-home="${m.home}" data-away="${m.away}" data-round="${roundName}">
                            <div style="text-align:center;margin-bottom:4px;">
                                <span class="match-round-badge">${roundName}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team">
                                    <span class="flag">${flagHome}</span>
                                    <span class="team-name">${m.home || '—'}</span>
                                </div>
                                <span class="score-center ${isPlayed ? '' : 'empty'}">${scoreText}</span>
                                <div class="team">
                                    <span class="flag">${flagAway}</span>
                                    <span class="team-name">${m.away || '—'}</span>
                                </div>
                            </div>
                            <div class="match-status ${isPlayed ? 'played' : ''}">${isPlayed ? 'Сыгран' : 'Ожидается'}</div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            container.innerHTML = html;

            document.querySelectorAll('.playoff-match-card').forEach(el => {
                el.addEventListener('click', function() {
                    const home = this.dataset.home;
                    const away = this.dataset.away;
                    const round = this.dataset.round;

                    for (const [r, matches] of Object.entries(PLAYOFF_DATA)) {
                        if (r === round) {
                            const match = matches.find(m => m.home === home && m.away === away);
                            if (match) {
                                openMatchDetail(round, match);
                                return;
                            }
                        }
                    }

                    openMatchDetail(round, { home, away, homeScore: null, awayScore: null, date: '2026-07-01',
                        time: '00:00' });
                });
            });
        }

        // =============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // =============================================================
        function initTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabs.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                    document.getElementById(`tab-${this.dataset.tab}`).classList.add('active');

                    if (this.dataset.tab === 'playoff') {
                        renderPlayoff();
                    }
                    if (this.dataset.tab === 'schedule') {
                        renderSchedule();
                    }
                    if (this.dataset.tab === 'stats') {
                        renderStats();
                    }
                });
            });
        }

        function initScheduleFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentScheduleFilter = this.dataset.filter;
                    renderSchedule();
                });
            });
        }

        function initPlayoffFilters() {
            const filterBtns = document.querySelectorAll('.round-filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentRoundFilter = this.dataset.round;
                    renderPlayoff();
                });
            });
        }

        function initModal() {
            document.getElementById('closeDetailBtn').addEventListener('click', function() {
                document.getElementById('matchDetailOverlay').classList.remove('active');
            });
            document.getElementById('matchDetailOverlay').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('matchDetailOverlay').classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderGroups();
            renderSchedule();
            renderStats();
            renderPlayoff();
            initTabs();
            initScheduleFilters();
            initPlayoffFilters();
            initModal();
            console.log('⚽ ЧМ-2026 загружен!');
        });
    </script>
