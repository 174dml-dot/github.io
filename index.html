<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ЧМ-2026 Групповой этап</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d2137 100%);
            min-height: 100vh;
            padding: 20px 16px;
            color: #ffffff;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #f9d423 0%, #f7971e 100%);
            padding: 20px 32px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 40px rgba(247, 151, 30, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header::before {
            content: '⚽';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(15deg);
        }
        .header-left h1 {
            font-size: 2rem;
            color: #1a1a2e;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.2);
        }
        .header-left .hosts {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .header-flags {
            display: flex;
            gap: 12px;
            font-size: 2.2rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 18px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 32px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #f9d423, #f7971e);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(247, 151, 30, 0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .group-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }
        .group-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .group-header {
            background: linear-gradient(135deg, #f9d423, #f7971e);
            color: #1a1a2e;
            padding: 14px 20px;
            font-weight: 800;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 1px;
        }
        .group-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            table-layout: fixed;
        }
        .group-table th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 3px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .group-table td {
            padding: 7px 3px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            vertical-align: middle;
        }
        .group-table .team-name {
            text-align: left;
            padding-left: 10px;
            font-weight: 500;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }
        .group-table .team-name:hover {
            color: #f9d423;
        }
        .group-table .team-name .flag {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .group-table .team-name .team-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .group-table .team-name .expand-icon {
            margin-left: auto;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            flex-shrink: 0;
        }
        .group-table .team-name .expand-icon.active {
            transform: rotate(180deg);
            color: #f9d423;
        }
        .group-table tr.top-two td:first-child {
            border-left: 4px solid #2ecc71;
        }
        .group-table tr.top-two {
            background: rgba(46, 204, 113, 0.12);
        }
        .group-table tr.third-best td:first-child {
            border-left: 4px solid #f9a825;
        }
        .group-table tr.third-best {
            background: rgba(249, 168, 37, 0.06);
        }
        .group-table tr.fourth-place td:first-child {
            border-left: 4px solid #e74c3c;
        }
        .group-table tr.fourth-place {
            background: rgba(231, 76, 60, 0.1);
        }
        .group-table tr.third-not-qualified td:first-child {
            border-left: 4px solid #e74c3c;
        }
        .group-table tr.third-not-qualified {
            background: rgba(231, 76, 60, 0.08);
        }
        .group-table .points {
            font-weight: 800;
            color: #f9d423;
            font-size: 1.05rem;
        }

        /* Выдвигающаяся панель */
        .team-detail-row {
            display: none;
            background: rgba(255, 255, 255, 0.02);
        }
        .team-detail-row.active {
            display: table-row;
        }
        .team-detail-row td {
            padding: 6px 10px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .team-matches-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0;
            width: 100%;
        }
        .team-match-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.8rem;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .team-match-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(249, 212, 35, 0.3);
        }
        .team-match-item .match-flag {
            font-size: 1.1rem;
        }
        .team-match-item .match-score {
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            color: #f9d423;
        }
        .team-match-item .match-score.empty-score {
            color: rgba(255, 255, 255, 0.2);
        }
        .team-match-item .match-date {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.6rem;
            margin-left: auto;
        }
        .team-match-item .match-result {
            font-weight: 600;
            font-size: 0.7rem;
            padding: 1px 8px;
            border-radius: 10px;
        }
        .team-match-item .match-result.win {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
        }
        .team-match-item .match-result.draw {
            color: #f9a825;
            background: rgba(249, 168, 37, 0.15);
        }
        .team-match-item .match-result.loss {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
        }
        .team-match-item .match-result.waiting {
            color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .schedule-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: 0.3s;
        }
        .schedule-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(249, 212, 35, 0.3);
        }
        .schedule-card .group-tag {
            display: inline-block;
            background: linear-gradient(135deg, #f9d423, #f7971e);
            color: #1a1a2e;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .schedule-card .match-datetime {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }
        .schedule-card .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 4px 0;
            gap: 4px;
        }
        .schedule-card .match-teams .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
            max-width: 38%;
        }
        .schedule-card .match-teams .team .flag {
            font-size: 1.4rem;
            line-height: 1.2;
        }
        .schedule-card .match-teams .team .team-name {
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.15;
            max-width: 100%;
        }
        .schedule-card .match-teams .score-center {
            font-size: 1.3rem;
            font-weight: 800;
            min-width: 100px;
            flex-shrink: 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .schedule-card .match-teams .score-center .red-card-badge {
            flex-shrink: 0;
        }
        .schedule-card .match-teams .score-center.played {
            color: #f9d423;
        }
        .schedule-card .match-teams .score-center.empty {
            color: rgba(255, 255, 255, 0.15);
        }
        .schedule-card .match-status {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            padding-top: 4px;
        }

        .match-detail-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .match-detail-overlay.active {
            display: flex;
        }
        .match-detail-modal {
            background: linear-gradient(145deg, #1a1a4e, #0d2137);
            border-radius: 24px;
            max-width: 640px;
            width: 100%;
            padding: 28px 32px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }
        .match-detail-modal .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 1.8rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            border: none;
            background: none;
            transition: 0.3s;
        }
        .match-detail-modal .close-btn:hover {
            color: white;
            transform: rotate(90deg);
        }
        .match-detail-modal .detail-header {
            text-align: center;
            margin-bottom: 10px;
        }
        .match-detail-modal .detail-header .group-badge {
            background: linear-gradient(135deg, #f9d423, #f7971e);
            color: #1a1a2e;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .match-detail-modal .detail-header .datetime {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 3px;
        }

        .match-detail-modal .detail-score {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0 4px 0;
            gap: 8px;
        }
        .match-detail-modal .detail-score .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            max-width: 32%;
        }
        .match-detail-modal .detail-score .team-block .flag {
            font-size: 1.8rem;
            line-height: 1.2;
        }
        .match-detail-modal .detail-score .score-big {
            font-size: 2.6rem;
            font-weight: 900;
            color: #f9d423;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }
        .match-detail-modal .detail-score .score-big.empty {
            color: rgba(255, 255, 255, 0.12);
        }

        .match-detail-modal .detail-scorers {
            display: flex;
            justify-content: space-between;
            padding: 6px 0 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 10px;
            gap: 10px;
        }
        .match-detail-modal .detail-scorers .scorers-col {
            flex: 1;
            text-align: left;
        }
        .match-detail-modal .detail-scorers .scorers-col.right {
            text-align: right;
        }
        .match-detail-modal .detail-scorers .scorers-col .goal {
            display: block;
            font-size: 0.78rem;
            padding: 1px 0;
        }
        .match-detail-modal .detail-scorers .scorers-col .goal .minute {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }
        .match-detail-modal .detail-scorers .scorers-col.home-col .goal {
            color: #f9d423;
        }
        .match-detail-modal .detail-scorers .scorers-col.away-col .goal {
            color: #ff6b6b;
        }
        .match-detail-modal .detail-scorers .scorers-empty {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
        }
        .match-detail-modal .detail-scorers .scorers-divider {
            width: 1px;
            background: rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .match-detail-modal .stat-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .match-detail-modal .stat-row .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            text-align: center;
            margin-bottom: 3px;
        }
        .match-detail-modal .stat-row .stat-bar-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values {
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
            min-width: 45px;
            text-align: center;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values .home-val {
            color: #f9d423;
        }
        .match-detail-modal .stat-row .stat-bar-wrap .stat-values .away-val {
            color: #ff6b6b;
        }
        .match-detail-modal .stat-row .stat-bar {
            height: 7px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            flex: 1;
            display: flex;
        }
        .match-detail-modal .stat-row .stat-bar .bar-home {
            background: linear-gradient(90deg, #f9d423, #f7971e);
            height: 100%;
            transition: width 0.5s;
        }
        .match-detail-modal .stat-row .stat-bar .bar-away {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            height: 100%;
            transition: width 0.5s;
        }

        .match-detail-modal .not-played {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.25);
            font-size: 1.1rem;
        }

        .stats-wrap {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .stats-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .stats-wrap th {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.06);
        }
        .stats-wrap td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.85);
        }
        .stats-wrap .points-cell {
            font-weight: 800;
            color: #f9d423;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(249, 212, 35, 0.15);
        }
        .stat-card .medal {
            font-size: 1.8rem;
        }
        .stat-card .name {
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 2px;
        }
        .stat-card .sub-info {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.35);
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 900;
            color: #f9d423;
            margin-top: 2px;
        }
        .stat-card .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }

        @media (max-width: 700px) {
            .groups-grid {
                grid-template-columns: 1fr 1fr;
            }
            .schedule-grid {
                grid-template-columns: 1fr;
            }
            .header {
                padding: 16px 20px;
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .header-left h1 {
                font-size: 1.5rem;
            }
            .header-flags {
                font-size: 1.6rem;
                padding: 4px 14px;
            }
            .match-detail-modal {
                padding: 20px;
                margin: 10px;
            }
            .match-detail-modal .detail-score .score-big {
                font-size: 2rem;
                min-width: 60px;
            }
            .tab-btn {
                padding: 8px 18px;
                font-size: 0.8rem;
            }
            .schedule-card .match-teams .team .team-name {
                font-size: 0.7rem;
            }
            .schedule-card .match-teams .team .flag {
                font-size: 1.2rem;
            }
            .schedule-card .match-teams .score-center {
                font-size: 1.1rem;
                min-width: 80px;
            }
            .team-match-item {
                font-size: 0.7rem;
                gap: 8px;
                flex-wrap: wrap;
            }
            .team-match-item .match-date {
                margin-left: 0;
                width: 100%;
                text-align: center;
            }
        }
        @media (max-width: 480px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
            .header-left h1 {
                font-size: 1.2rem;
            }
            .schedule-card .match-teams .team .team-name {
                font-size: 0.65rem;
            }
            .schedule-card .match-teams .score-center {
                font-size: 1rem;
                min-width: 70px;
            }
            .match-detail-modal .detail-score .score-big {
                font-size: 1.6rem;
                min-width: 50px;
            }
            .match-detail-modal .detail-scorers .scorers-col .goal {
                font-size: 0.7rem;
            }
            .team-match-item {
                font-size: 0.65rem;
                gap: 4px;
            }
            .team-match-item .match-score {
                min-width: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🏆 Чемпионат мира 2026</h1>
                <div class="hosts">США · Канада · Мексика</div>
            </div>
            <div class="header-flags">
                <span>🇺🇸</span>
                <span>🇨🇦</span>
                <span>🇲🇽</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">Группы</button>
            <button class="tab-btn" data-tab="schedule">Расписание</button>
            <button class="tab-btn" data-tab="stats">Общая статистика</button>
        </div>

        <div id="tab-groups" class="tab-content active">
            <div id="groupsContainer" class="groups-grid"></div>
        </div>

        <div id="tab-schedule" class="tab-content">
            <div id="scheduleContainer" class="schedule-grid"></div>
        </div>

        <div id="tab-stats" class="tab-content">

        const GROUPS = Object.keys(MATCHES_DATA);

        function getTeams(groupId) {
            const matches = MATCHES_DATA[groupId] || [];
            const teamSet = new Set();
            matches.forEach(m => { teamSet.add(m.home);
                teamSet.add(m.away); });
            return Array.from(teamSet);
        }

        function computeTable(groupId) {
            const matches = MATCHES_DATA[groupId] || [];
            const teams = getTeams(groupId);
            const stats = {};
            teams.forEach(t => {
                stats[t] = { played: 0, wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 };
            });
            matches.forEach(m => {
                if (m.homeScore === null || m.awayScore === null) return;
                const h = m.home,
                    a = m.away;
                const hs = m.homeScore,
                    as = m.awayScore;
                stats[h].played += 1;
                stats[a].played += 1;
                stats[h].goalsFor += hs;
                stats[h].goalsAgainst += as;
                stats[a].goalsFor += as;
                stats[a].goalsAgainst += hs;
                if (hs > as) { stats[h].wins += 1;
                    stats[a].losses += 1;
                    stats[h].points += 3; } else if (hs < as) { stats[a].wins += 1;
                    stats[h].losses += 1;
                    stats[a].points += 3; } else { stats[h].draws += 1;
                    stats[a].draws += 1;
                    stats[h].points += 1;
                    stats[a].points += 1; }
            });
            const table = teams.map(name => ({
                name,
                ...stats[name],
                goalDiff: stats[name].goalsFor - stats[name].goalsAgainst
            }));
            table.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });
            return table;
        }

        function getQualifiers() {
            const allTables = {};
            const thirdPlaceTeams = [];
            GROUPS.forEach(gid => {
                const table = computeTable(gid);
                allTables[gid] = table;
                if (table.length >= 3) {
                    const third = table[2];
                    thirdPlaceTeams.push({ group: gid, team: third.name, points: third.points, goalDiff: third
                            .goalDiff, goalsFor: third.goalsFor });
                }
            });
            thirdPlaceTeams.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                return b.goalsFor - a.goalsFor;
            });
            const bestThird = thirdPlaceTeams.slice(0, 8).map(t => t.team);
            const result = {};
            GROUPS.forEach(gid => {
                const table = allTables[gid];
                if (!table) return;
                const qual = [];
                const thirdName = table.length >= 3 ? table[2].name : null;
                if (table.length >= 1) qual.push(table[0].name);
                if (table.length >= 2) qual.push(table[1].name);
                if (thirdName && bestThird.includes(thirdName)) {
                    qual.push(thirdName);
                }
                result[gid] = { qual, bestThird, thirdName };
            });
            return result;
        }

            const all = [];

                MATCHES_DATA[gid].forEach(m => {
                    all.push({ group: gid, ...m });

            return all;

                const dateA = new Date(`${a.date}T${a.time}`);

                return dateA - dateB;

            return teamMatches.slice(-3);

            }
            const isHome = match.home === teamName;
            const ourScore = isHome ? match.homeScore : match.awayScore;
            const theirScore = isHome ? match.awayScore : match.homeScore;
            if (ourScore > theirScore) return 'win';
            if (ourScore < theirScore) return 'loss';
            return 'draw';
        }

        function getMatchScoreText(match, teamName) {
            if (match.homeScore === null || match.awayScore === null) {
                return '— : —';
            }
            const isHome = match.home === teamName;
            const ourScore = isHome ? match.homeScore : match.awayScore;
            const theirScore = isHome ? match.awayScore : match.homeScore;
            return `${ourScore} : ${theirScore}`;
        }

        function getOpponent(match, teamName) {
            return match.home === teamName ? match.away : match.home;
        }

        function getMatchFlag(teamName) {
            return FLAGS[teamName] || '🏴';
        }

        function getOverallStats() {
            const teamStats = {};
            const allScorers = [];

            GROUPS.forEach(gid => {
                const table = computeTable(gid);
                table.forEach(row => {
                    if (!teamStats[row.name]) {
                        teamStats[row.name] = { name: row.name, group: gid, points: 0, goalsFor: 0,
                            goalsAgainst: 0, goalDiff: 0, played: 0, wins: 0, draws: 0,
                            losses: 0, yellow: 0, red: 0, shotsOn: 0 };
                    }
                    const s = teamStats[row.name];
                    s.points += row.points;
                    s.goalsFor += row.goalsFor;
                    s.goalsAgainst += row.goalsAgainst;
                    s.goalDiff += row.goalDiff;
                    s.played += row.played;
                    s.wins += row.wins;
                    s.draws += row.draws;
                    s.losses += row.losses;
                });
                MATCHES_DATA[gid].forEach(m => {
                    if (m.scorers) {
                        m.scorers.forEach(s => {
                            allScorers.push({ player: cleanPlayerNameForStats(s.player), team: s.team ===
                                    'home' ? m.home : m.away, goals: 1 });
                        });
                    }
                });
                MATCHES_DATA[gid].forEach(m => {
                    if (m.homeScore !== null && m.awayScore !== null) {
                        if (teamStats[m.home]) {
                            teamStats[m.home].yellow += m.yellowHome || 0;
                            teamStats[m.home].red += m.redHome || 0;
                            teamStats[m.home].shotsOn += m.shotsOnHome || 0;
                        }
                        if (teamStats[m.away]) {
                            teamStats[m.away].yellow += m.yellowAway || 0;
                            teamStats[m.away].red += m.redAway || 0;
                            teamStats[m.away].shotsOn += m.shotsOnAway || 0;
                        }
                    }
                });
            });

            const scorerStats = {};
            allScorers.forEach(s => {
                if (!scorerStats[s.player]) scorerStats[s.player] = { player: s.player, team: s.team,
                    goals: 0 };
                scorerStats[s.player].goals += s.goals;
            });
            const topScorers = Object.values(scorerStats).sort((a, b) => b.goals - a.goals).slice(0, 5);

            const teamArr = Object.values(teamStats);
            const bestAttack = [...teamArr].sort((a, b) => b.goalsFor - a.goalsFor).slice(0, 3);
            const bestDefense = [...teamArr].sort((a, b) => a.goalsAgainst - b.goalsAgainst).slice(0, 3);
            const mostYellow = [...teamArr].sort((a, b) => b.yellow - a.yellow).slice(0, 3);
            const mostRed = [...teamArr].sort((a, b) => b.red - a.red).slice(0, 3);
            const mostShots = [...teamArr].sort((a, b) => b.shotsOn - a.shotsOn).slice(0, 3);

            return {
                teams: teamArr.sort((a, b) => {
                    if (a.points !== b.points) return b.points - a.points;
                    if (a.goalDiff !== b.goalDiff) return b.goalDiff - a.goalDiff;
                    return b.goalsFor - a.goalsFor;
                }),
                topScorers,
                bestAttack,
                bestDefense,
                mostYellow,
                mostRed,
                mostShots
            };
        }

        function toggleTeamDetail(teamName, groupId) {
            const detailRow = document.getElementById(`detail-${groupId}-${teamName.replace(/\s/g, '-')}`);
            const icon = document.getElementById(`icon-${groupId}-${teamName.replace(/\s/g, '-')}`);
            if (detailRow) {
                const isActive = detailRow.classList.contains('active');
                document.querySelectorAll('.team-detail-row.active').forEach(row => {
                    if (row.id !== detailRow.id) {
                        row.classList.remove('active');
                        const iconId = row.id.replace('detail-', 'icon-');
                        const otherIcon = document.getElementById(iconId);
                        if (otherIcon) otherIcon.classList.remove('active');
                    }
                });
                if (isActive) {
                    detailRow.classList.remove('active');
                    if (icon) icon.classList.remove('active');
                } else {
                    detailRow.classList.add('active');
                    if (icon) icon.classList.add('active');
                }
            }
        }

        function openMatchDetailFromTeam(groupId, home, away) {
            const match = MATCHES_DATA[groupId].find(m => m.home === home && m.away === away);
            if (match) openMatchDetail(groupId, match);
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            const qualData = getQualifiers();
            let html = '';
            GROUPS.forEach(gid => {
                const table = computeTable(gid);
                const qualList = qualData[gid]?.qual || [];
                html += `<div class="group-card">
                            <div class="group-header">Группа ${gid}</div>
                            <table class="group-table">
                                <thead><tr>
                                    <th style="text-align:left;padding-left:10px;width:38%;">Команда</th>
                                    <th style="width:8%;">И</th><th style="width:8%;">В</th>
                                    <th style="width:8%;">Н</th><th style="width:8%;">П</th>
                                    <th style="width:14%;">М</th><th style="width:8%;">±</th>
                                    <th style="width:8%;">О</th>
                                </tr></thead>
                                <tbody>`;
                table.forEach((row, idx) => {
                    let rowClass = '';
                    if (idx < 2 && qualList.includes(row.name)) {
                        rowClass = 'top-two';
                    } else if (idx === 2 && qualList.includes(row.name)) {
                        rowClass = 'third-best';
                    } else if (idx === 2 && !qualList.includes(row.name)) {
                        rowClass = 'third-not-qualified';
                    } else if (idx === 3) {
                        rowClass = 'fourth-place';
                    }
                    const flag = FLAGS[row.name] || '🏴';
                    const teamId = row.name.replace(/\s/g, '-');
                    const teamMatches = getTeamMatches(row.name, gid);

                    html += `<tr class="${rowClass}">
                                <td class="team-name" onclick="toggleTeamDetail('${row.name}', '${gid}')">
                                    <span class="flag">${flag}</span>
                                    <span class="team-text">${row.name}</span>
                                    <span class="expand-icon" id="icon-${gid}-${teamId}">▼</span>
                                </td>
                                <td>${row.played}</td>
                                <td>${row.wins}</td>
                                <td>${row.draws}</td>
                                <td>${row.losses}</td>
                                <td>${row.goalsFor}:${row.goalsAgainst}</td>
                                <td>${row.goalDiff}</td>
                                <td class="points">${row.points}</td>
                            </tr>
                            <tr class="team-detail-row" id="detail-${gid}-${teamId}">
                                <td colspan="8">
                                    <div class="team-matches-list">`;

                    if (teamMatches.length === 0) {
                        html += `<div class="team-match-item" style="color:rgba(255,255,255,0.2);font-size:0.8rem;cursor:default;">Нет сыгранных матчей</div>`;
                    } else {
                        teamMatches.forEach(m => {
                            const opponent = getOpponent(m, row.name);
                            const oppFlag = getMatchFlag(opponent);
                            const ownFlag = getMatchFlag(row.name);
                            const scoreText = getMatchScoreText(m, row.name);
                            const result = getMatchResult(m, row.name);
                            const isPlayed = m.homeScore !== null && m.awayScore !== null;
                            const dateFormatted = m.date.replace('2026-', '').replace('-', '.');

                            let resultClass = 'waiting';
                            let resultText = '⏳';
                            if (isPlayed) {
                                resultClass = result;
                                resultText = result === 'win' ? 'Победа' : result === 'draw' ? 'Ничья' :
                                    'Поражение';
                            }

                            html += `<div class="team-match-item" onclick="openMatchDetailFromTeam('${gid}', '${m.home}', '${m.away}')">
                                        <span class="match-date">${dateFormatted}</span>
                                        <span class="match-flag">${ownFlag}</span>
                                        <span class="match-score ${isPlayed ? '' : 'empty-score'}">${scoreText}</span>
                                        <span class="match-flag">${oppFlag}</span>
                                        <span class="match-result ${resultClass}">${resultText}</span>
                                    </div>`;
                        });
                    }

                    html += `</div>
                                </td>
                            </tr>`;
                });
                html += `</tbody></table></div>`;
            });
            container.innerHTML = html;
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            const allMatches = getAllMatches();

            allMatches.sort((a, b) => {
                const dateA = new Date(`${a.date}T${a.time}`);
                const dateB = new Date(`${b.date}T${b.time}`);
                return dateA - dateB;
            });

            let html = '';
            allMatches.forEach((m) => {
                const isPlayed = m.homeScore !== null && m.awayScore !== null;
                const scoreText = isPlayed ? `${m.homeScore} : ${m.awayScore}` : '— : —';
                const scoreClass = isPlayed ? 'played' : 'empty';
                const dateFormatted = m.date.replace('2026-', '').replace('-', '.');
                const flagHome = FLAGS[m.home] || '🏴';
                const flagAway = FLAGS[m.away] || '🏴';

                const redHome = m.redHome || 0;
                const redAway = m.redAway || 0;

                let redLeft = '';
                let redRight = '';
                if (redHome > 0) {
                    redLeft =
                        `<span class="red-card-badge" style="display:inline-block;background:#e74c3c;color:white;font-weight:800;font-size:0.6rem;padding:0 5px;border-radius:3px;line-height:16px;min-width:16px;text-align:center;margin-right:3px;">${redHome}</span>`;
                }
                if (redAway > 0) {
                    redRight =
                        `<span class="red-card-badge" style="display:inline-block;background:#e74c3c;color:white;font-weight:800;font-size:0.6rem;padding:0 5px;border-radius:3px;line-height:16px;min-width:16px;text-align:center;margin-left:3px;">${redAway}</span>`;
                }

                html += `<div class="schedule-card" data-group="${m.group}" data-home="${m.home}" data-away="${m.away}">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="group-tag">Группа ${m.group}</span>
                                <span class="match-datetime">${dateFormatted} ${m.time}</span>
                            </div>
                            <div class="match-teams">
                                <span class="team home">
                                    <span class="flag">${flagHome}</span>
                                    <span class="team-name">${m.home}</span>
                                </span>
                                <span class="score-center ${scoreClass}">
                                    ${redLeft}${scoreText}${redRight}
                                </span>
                                <span class="team away">
                                    <span class="flag">${flagAway}</span>
                                    <span class="team-name">${m.away}</span>
                                </span>
                            </div>
                            <div class="match-status">${isPlayed ? '✅ Сыгран' : '⏳ Ожидается'}</div>
                        </div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.schedule-card').forEach(el => {
                el.addEventListener('click', function() {
                    const group = this.dataset.group;
                    const home = this.dataset.home;
                    const away = this.dataset.away;
                    const match = MATCHES_DATA[group].find(m => m.home === home && m.away === away);
                    if (match) openMatchDetail(group, match);
                });
            });
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            const stats = getOverallStats();
            const teams = stats.teams || [];

            let html = '';

            if (stats.topScorers && stats.topScorers.length > 0) {
                html += `<h4 style="color:#f9d423;margin-bottom:10px;">⚽ Лучшие бомбардиры</h4>
                        <div class="stats-grid">`;
                stats.topScorers.forEach((s, i) => {
                    const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                    html += `<div class="stat-card">
                                <div class="medal">${medals[i] || ''}</div>
                                <div class="name">${s.player}</div>
                                <div class="sub-info">${s.team}</div>
                                <div class="value">${s.goals}</div>
                                <div class="label">Голов</div>
                            </div>`;
                });
                html += `</div>`;
            }

            if (stats.bestAttack && stats.bestAttack.length > 0) {
                html += `<h4 style="color:#f9d423;margin:16px 0 10px 0;">⚡ Лучшая атака</h4>
                        <div class="stats-grid">`;
                stats.bestAttack.forEach(s => {
                    html += `<div class="stat-card">
                                <div class="name">${s.name}</div>
                                <div class="sub-info">Группа ${s.group}</div>
                                <div class="value">${s.goalsFor}</div>
                                <div class="label">Голов забито</div>
                            </div>`;
                });
                html += `</div>`;
            }

            if (stats.bestDefense && stats.bestDefense.length > 0) {
                html += `<h4 style="color:#f9d423;margin:16px 0 10px 0;">🛡️ Лучшая защита</h4>
                        <div class="stats-grid">`;
                stats.bestDefense.forEach(s => {
                    html += `<div class="stat-card">
                                <div class="name">${s.name}</div>
                                <div class="sub-info">Группа ${s.group}</div>
                                <div class="value">${s.goalsAgainst}</div>
                                <div class="label">Голов пропущено</div>
                            </div>`;
                });
                html += `</div>`;
            }

            if (stats.mostYellow && stats.mostYellow.length > 0) {
                html += `<h4 style="color:#f9d423;margin:16px 0 10px 0;">🟨 Больше жёлтых карточек</h4>
                        <div class="stats-grid">`;
                stats.mostYellow.forEach(s => {
                    html += `<div class="stat-card">
                                <div class="name">${s.name}</div>
                                <div class="sub-info">Группа ${s.group}</div>
                                <div class="value">${s.yellow}</div>
                                <div class="label">Жёлтых карточек</div>
                            </div>`;
                });
                html += `</div>`;
            }

            if (stats.mostRed && stats.mostRed.length > 0) {
                html += `<h4 style="color:#f9d423;margin:16px 0 10px 0;">🟥 Больше красных карточек</h4>
                        <div class="stats-grid">`;
                stats.mostRed.forEach(s => {
                    html += `<div class="stat-card">
                                <div class="name">${s.name}</div>
                                <div class="sub-info">Группа ${s.group}</div>
                                <div class="value">${s.red}</div>
                                <div class="label">Красных карточек</div>
                            </div>`;
                });
                html += `</div>`;
            }

            if (stats.mostShots && stats.mostShots.length > 0) {
                html += `<h4 style="color:#f9d423;margin:16px 0 10px 0;">🎯 Больше ударов в створ</h4>
                        <div class="stats-grid">`;
                stats.mostShots.forEach(s => {
                    html += `<div class="stat-card">
                                <div class="name">${s.name}</div>
                                <div class="sub-info">Группа ${s.group}</div>
                                <div class="value">${s.shotsOn}</div>
                                <div class="label">Ударов в створ</div>
                            </div>`;
                });
                html += `</div>`;
            }

            html += `<h4 style="color:#f9d423;margin:20px 0 12px 0;">📋 Общий рейтинг команд</h4>
                    <table>
                        <thead><tr>
                            <th>#</th><th>Команда</th><th>Гр</th>
                            <th>И</th><th>В</th><th>Н</th><th>П</th>
                            <th>М</th><th>±</th><th>О</th>
                            <th>🟨</th><th>🟥</th><th>🎯</th>
                        </tr></thead>
                        <tbody>`;
            teams.forEach((s, idx) => {
                html += `<tr>
                            <td>${idx + 1}</td>
                            <td>${s.name}</td>
                            <td>${s.group}</td>
                            <td>${s.played}</td>
                            <td>${s.wins}</td>
                            <td>${s.draws}</td>
                            <td>${s.losses}</td>
                            <td>${s.goalsFor}:${s.goalsAgainst}</td>
                            <td>${s.goalDiff > 0 ? '+' : ''}${s.goalDiff}</td>
                            <td class="points-cell">${s.points}</td>
                            <td>${s.yellow || 0}</td>
                            <td>${s.red || 0}</td>
                            <td>${s.shotsOn || 0}</td>
                        </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function openMatchDetail(groupId, match) {
            const overlay = document.getElementById('matchDetailOverlay');
            const content = document.getElementById('matchDetailContent');
            const isPlayed = match.homeScore !== null && match.awayScore !== null;
            const dateFormatted = match.date.replace('2026-', '').replace('-', '.');
            const flagHome = FLAGS[match.home] || '🏴';
            const flagAway = FLAGS[match.away] || '🏴';

            let homeScorersHtml = '';
            let awayScorersHtml = '';
            if (isPlayed && match.scorers && match.scorers.length > 0) {
                const homeGoals = match.scorers.filter(s => s.team === 'home');
                const awayGoals = match.scorers.filter(s => s.team === 'away');
                if (homeGoals.length > 0) {
                    homeScorersHtml = homeGoals.map(s =>
                        `<span class="goal"><span class="minute">${s.minute}'</span> ${displayPlayerName(s.player)}</span>`
                    ).join('');
                }
                if (awayGoals.length > 0) {
                    awayScorersHtml = awayGoals.map(s =>
                        `<span class="goal">${displayPlayerName(s.player)} <span class="minute">${s.minute}'</span></span>`
                    ).join('');
                }
            }

            let html = `
                <div class="detail-header">
                    <span class="group-badge">Группа ${groupId}</span>
                    <div class="datetime">${dateFormatted} ${match.time}</div>
                </div>
                <div class="detail-score">
                    <div class="team-block home">
                        <span class="flag">${flagHome}</span>
                    </div>
                    <span class="score-big ${isPlayed ? '' : 'empty'}">${isPlayed ? `${match.homeScore} : ${match.awayScore}` : '— : —'}</span>
                    <div class="team-block away">
                        <span class="flag">${flagAway}</span>
                    </div>
                </div>`;

            if (isPlayed) {
                html += `<div class="detail-scorers">
                            <div class="scorers-col home-col">
                                ${homeScorersHtml || '<span class="scorers-empty">—</span>'}
                            </div>
                            <div class="scorers-divider"></div>
                            <div class="scorers-col right away-col">
                                ${awayScorersHtml || '<span class="scorers-empty">—</span>'}
                            </div>
                        </div>`;
            } else {
                html += `<div class="detail-scorers" style="justify-content:center;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:10px;padding-bottom:12px;">
                            <span style="color:rgba(255,255,255,0.15);font-size:0.8rem;">⏳ Матч не сыгран</span>
                        </div>`;
            }

            if (isPlayed) {
                const statsOrder = [
                    { label: 'Владение мячом', home: match.possessionHome || 50, away: match.possessionAway || 50,
                        format: '%' },
                    { label: 'Всего ударов', home: match.shotsTotalHome || 0, away: match.shotsTotalAway || 0,
                        format: '' },
                    { label: 'Удары в створ', home: match.shotsOnHome || 0, away: match.shotsOnAway || 0,
                        format: '' },
                    { label: 'Ожидаемый счёт', home: match.bigChancesHome || 0, away: match.bigChancesAway || 0,
                        format: '' },
                    { label: 'Угловые', home: match.cornersHome || 0, away: match.cornersAway || 0, format: '' },
                    { label: 'Жёлтые карточки', home: match.yellowHome || 0, away: match.yellowAway || 0,
                        format: '' },
                    { label: 'Красные карточки', home: match.redHome || 0, away: match.redAway || 0, format: '' }
                ];

                html += `<div style="margin:8px 0;">`;
                statsOrder.forEach(stat => {
                    const total = stat.home + stat.away;
                    const homePct = total > 0 ? (stat.home / total * 100) : 50;
                    const awayPct = total > 0 ? (stat.away / total * 100) : 50;
                    const homeVal = stat.decimals ? stat.home.toFixed(stat.decimals) : stat.home;
                    const awayVal = stat.decimals ? stat.away.toFixed(stat.decimals) : stat.away;
                    html += `<div class="stat-row">
                                <div class="stat-label">${stat.label}</div>
                                <div class="stat-bar-wrap">
                                    <div class="stat-values"><span class="home-val">${homeVal}${stat.format}</span></div>
                                    <div class="stat-bar">
                                        <div class="bar-home" style="width:${homePct}%;"></div>
                                        <div class="bar-away" style="width:${awayPct}%;"></div>
                                    </div>
                                    <div class="stat-values"><span class="away-val">${awayVal}${stat.format}</span></div>
                                </div>
                            </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="not-played">⏳ Матч ещё не сыгран</div>`;
            }

            content.innerHTML = html;
            overlay.classList.add('active');
        }

        function initTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabs.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                    document.getElementById(`tab-${this.dataset.tab}`).classList.add('active');
                });
            });
        }

        function initModal() {
            document.getElementById('closeDetailBtn').addEventListener('click', function() {
                document.getElementById('matchDetailOverlay').classList.remove('active');
            });
            document.getElementById('matchDetailOverlay').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('matchDetailOverlay').classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderGroups();
            renderSchedule();
            renderStats();
            initTabs();
            initModal();
            console.log('⚽ ЧМ-2026 загружен!');
        });
    </script>
</body>
</html>
