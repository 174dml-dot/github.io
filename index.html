<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Одиночный TikTok Стрим | Ваша трансляция</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Основной контейнер */
        .feed {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Видеопоток */
        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0a0a;
        }

        /* Затемнение для лучшей читаемости текста */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 50%);
            pointer-events: none;
        }

        /* Счётчик зрителей */
        .viewer-count {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* Кнопка лайка */
        .like-btn {
            position: absolute;
            bottom: 100px;
            left: 25px;
            color: #ff2626;
            font-size: 48px;
            cursor: pointer;
            z-index: 20;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            transition: transform 0.1s ease;
        }
        
        .like-btn:active {
            transform: scale(0.9);
        }

        /* Счётчик лайков */
        .like-count {
            position: absolute;
            bottom: 55px;
            left: 25px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 10;
        }

        /* Область комментариев */
        .comments {
            position: absolute;
            right: 15px;
            bottom: 20px;
            width: 280px;
            max-height: 300px;
            overflow-y: auto;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 16px;
            z-index: 10;
            scroll-behavior: smooth;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Стилизация скролла */
        .comments::-webkit-scrollbar {
            width: 4px;
        }
        .comments::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .comments::-webkit-scrollbar-thumb {
            background: #ff2626;
            border-radius: 10px;
        }

        .comment {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
            word-break: break-word;
            line-height: 1.4;
        }
        
        .comment strong {
            color: #ff2626;
            margin-right: 8px;
        }

        /* Кнопка поделиться */
        .share-btn {
            position: absolute;
            bottom: 100px;
            right: 25px;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        
        .share-btn:hover {
            transform: scale(1.1);
            background: rgba(255,38,38,0.8);
        }

        /* Информация о стримере */
        .streamer-info {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            z-index: 10;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2626, #ff9e26);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        
        .streamer-info span {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        /* Индикатор активности */
        .activity-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 15;
        }
        
        .activity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff2626, #ff9e26);
            transition: width 30s linear;
        }

        /* Панель управления */
        .control-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 30;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        
        .feed:hover .control-panel {
            opacity: 1;
            pointer-events: auto;
        }
        
        .btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            background: rgba(0,0,0,0.9);
        }
        
        .end-stream-btn {
            background: #ff2626;
            color: white;
        }
        
        .end-stream-btn:hover {
            background: #cc0000;
        }

        /* Эффект всплывающих сердечек */
        .floating-heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
            z-index: 100;
        }

        /* Эффект пульсации лайка */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); text-shadow: 0 0 20px rgba(255,38,38,0.8); }
            100% { transform: scale(1); }
        }
        
        .liked {
            animation: pulse 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        /* Экран завершения стрима */
        .stream-ended {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #fff;
            text-align: center;
            z-index: 200;
            animation: fadeIn 0.5s;
        }
        
        .stream-ended h2 {
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ff2626, #ff9e26);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stream-ended p {
            font-size: 20px;
            margin: 10px 0;
        }
        
        .stream-ended button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #ff2626, #ff9e26);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .stream-ended button:hover {
            transform: scale(1.05);
        }

        /* Всплывающее окно поделиться */
        .share-popup {
            position: fixed;
            bottom: 120px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            z-index: 200;
            animation: slideIn 0.3s;
            border: 1px solid #ff2626;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="feed">
        <video class="video-stream" autoplay muted playsinline></video>
        <div class="overlay"></div>
        
        <div class="viewer-count">👥 Зрителей: 2 345</div>
        
        <div class="like-btn">❤️</div>
        <div class="like-count">❤️ Лайки: 1 250</div>
        
        <div class="comments"></div>
        
        <div class="share-btn">↗️</div>
        
        <div class="streamer-info">
            <div class="avatar">🎥</div>
            <span>LIVE • Ваш стрим</span>
        </div>
        
        <div class="activity-bar">
            <div class="activity-fill"></div>
        </div>
        
        <div class="control-panel">
            <button class="btn" id="toggle-camera">📷 Камера</button>
            <button class="btn" id="toggle-mic">🎤 Микрофон</button>
            <button class="btn" id="quality-settings">⚙️ Качество</button>
            <button class="btn end-stream-btn" id="end-stream">🔴 Завершить</button>
        </div>
    </div>

    <script>
        // ========== ИНИЦИАЛИЗАЦИЯ ПЕРЕМЕННЫХ ==========
        let likes = 1250;
        let viewers = 2345;
        let mediaStream = null;
        let cameraActive = true;
        let micActive = true;
        let streamActive = true;
        let currentQuality = '720p';
        
        // Массивы для хранения интервалов
        let botIntervals = [];
        let activityInterval = null;
        
        // База ботов
        const botNames = ['🔥fan_tik', '💜lover_88', '🎧music_fan', '✨star_viewer', '⭐tik_star', '🌸blink', '🚀rocket_fan'];
        const botComments = [
            'Круто! 🔥', 'Автор топ!', 'Спасибо за стрим! 💜', 'Очень интересно!', 'Лучший контент!', 
            '❤️', 'Супер!', 'Классная трансляция!', 'Продолжай в том же духе!', 'Вау! 👀',
            'Когда следующий стрим?', 'Обожаю такой контент!', '100/10', 'Зайка ❤️'
        ];
        
        // Качество видео
        const qualitySettings = {
            '720p': { width: 1280, height: 720 },
            '480p': { width: 854, height: 480 },
            'Auto': { width: 1920, height: 1080 }
        };

        // ========== ФУНКЦИИ ==========
        
        // Инициализация камеры и микрофона
        async function initCamera() {
            try {
                const constraints = {
                    video: cameraActive ? {
                        width: { ideal: qualitySettings[currentQuality].width },
                        height: { ideal: qualitySettings[currentQuality].height }
                    } : false,
                    audio: micActive
                };
                
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.querySelector('.video-stream');
                video.srcObject = mediaStream;
                video.play();
                
                console.log('✅ Камера и микрофон инициализированы');
            } catch (err) {
                console.error('❌ Ошибка доступа к камере/микрофону:', err);
                document.querySelector('.video-stream').style.background = '#1a1a1a';
                // Показываем заглушку
                showPlaceholder();
            }
        }
        
        // Заглушка если нет камеры
        function showPlaceholder() {
            const video = document.querySelector('.video-stream');
            video.style.objectFit = 'cover';
            video.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            // Создаем canvas с текстом
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1920;
            canvas.height = 1080;
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎥 Камера не обнаружена', canvas.width/2, canvas.height/2);
            ctx.font = '24px Arial';
            ctx.fillStyle = '#ff2626';
            ctx.fillText('Режим демонстрации', canvas.width/2, canvas.height/2 + 60);
            
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                video.src = url;
            });
        }
        
        // Остановка всех ботов
        function stopAllIntervals() {
            botIntervals.forEach(interval => clearInterval(interval));
            botIntervals = [];
            if (activityInterval) clearInterval(activityInterval);
        }
        
        // Создание всплывающего сердечка
        function createFloatingHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            heart.style.left = (x || Math.random() * window.innerWidth) + 'px';
            heart.style.top = (y || window.innerHeight - 100) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }
        
        // Обновление статистики
        function updateStats() {
            document.querySelector('.viewer-count').textContent = `👥 Зрителей: ${viewers.toLocaleString()}`;
            document.querySelector('.like-count').textContent = `❤️ Лайки: ${likes.toLocaleString()}`;
        }
        
        // Добавление комментария
        function addComment(username, text, isBot = true) {
            const commentsDiv = document.querySelector('.comments');
            const commentEl = document.createElement('div');
            commentEl.className = 'comment';
            commentEl.innerHTML = `<strong>${username}</strong> ${text}`;
            commentsDiv.appendChild(commentEl);
            commentsDiv.scrollTop = commentsDiv.scrollHeight;
            
            // Автоудаление старых комментариев (оставляем последние 50)
            while (commentsDiv.children.length > 50) {
                commentsDiv.removeChild(commentsDiv.firstChild);
            }
        }
        
        // Запуск имитации активности ботов
        function startBotActivity() {
            // Изменение количества зрителей
            const viewerInterval = setInterval(() => {
                if (!streamActive) return;
                const change = Math.floor(Math.random() * 60) - 20;
                viewers += change;
                viewers = Math.max(800, Math.min(15000, viewers));
                updateStats();
            }, 4000);
            botIntervals.push(viewerInterval);
            
            // Автоматические лайки от ботов
            const likeInterval = setInterval(() => {
                if (!streamActive) return;
                const botLikes = Math.floor(Math.random() * 7) + 1;
                likes += botLikes;
                updateStats();
                
                // Визуальный эффект для случайных лайков
                if (Math.random() > 0.7) {
                    createFloatingHeart();
                }
            }, 2500);
            botIntervals.push(likeInterval);
            
            // Комментарии от ботов
            const commentInterval = setInterval(() => {
                if (!streamActive) return;
                const botName = botNames[Math.floor(Math.random() * botNames.length)];
                const botText = botComments[Math.floor(Math.random() * botComments.length)];
                addComment(botName, botText, true);
            }, 7000);
            botIntervals.push(commentInterval);
        }
        
        // Индикатор активности
        function startActivityBar() {
            const activityFill = document.querySelector('.activity-fill');
            activityFill.style.width = '0%';
            activityFill.style.transition = 'none';
            activityFill.offsetHeight; // reflow
            activityFill.style.transition = 'width 30s linear';
            activityFill.style.width = '100%';
        }
        
        function initActivityLoop() {
            startActivityBar();
            activityInterval = setInterval(() => {
                if (streamActive) {
                    startActivityBar();
                }
            }, 30000);
        }
        
        // Завершение стрима
        function endStream() {
            streamActive = false;
            stopAllIntervals();
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            
            const feed = document.querySelector('.feed');
            feed.innerHTML = `
                <div class="stream-ended">
                    <h2>🔴 Стрим завершён</h2>
                    <p>📊 Итоговая статистика:</p>
                    <p>👥 Всего зрителей: ${viewers.toLocaleString()}</p>
                    <p>❤️ Всего лайков: ${likes.toLocaleString()}</p>
                    <p>💬 Всего комментариев: ${document.querySelectorAll('.comment').length}</p>
                    <p>⏱️ Длительность: ${Math.floor((Date.now() - streamStartTime) / 1000)} секунд</p>
                    <button onclick="location.reload()">🎬 Начать новый стрим</button>
                </div>
            `;
        }
        
        // Настройки качества
        function showQualityMenu() {
            const qualities = ['Auto', '720p', '480p'];
            const current = currentQuality;
            const newQuality = prompt(`Выберите качество видео:\n${qualities.join(', ')}\nТекущее: ${current}`, current);
            if (newQuality && qualities.includes(newQuality)) {
                currentQuality = newQuality;
                if (cameraActive) {
                    initCamera();
                }
                alert(`Качество изменено на ${currentQuality}`);
            }
        }
        
        // Поделиться ссылкой
        function shareStream() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const popup = document.createElement('div');
                popup.className = 'share-popup';
                popup.innerHTML = '✅ Ссылка скопирована!';
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 2000);
            });
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        
        let streamStartTime = Date.now();
        
        // Инициализация при загрузке
        window.addEventListener('load', async () => {
            await initCamera();
            startBotActivity();
            initActivityLoop();
            
            // Добавляем приветственные комментарии
            setTimeout(() => {
                addComment('🤖 Система', 'Стрим начался! Приятного просмотра!', false);
                addComment('💜 TikTok Bot', '5000 зрителей уже в эфире!', false);
            }, 1000);
        });
        
        // Лайк от пользователя
        document.querySelector('.like-btn').addEventListener('click', (e) => {
            if (!streamActive) return;
            
            const btn = e.currentTarget;
            btn.classList.add('liked');
            setTimeout(() => btn.classList.remove('liked'), 300);
            
            likes += 1;
            updateStats();
            createFloatingHeart(e.clientX, e.clientY);
            
            // 20% шанс что бот ответит на лайк
            if (Math.random() < 0.2) {
                setTimeout(() => {
                    addComment('🤖 Бот', 'Спасибо за лайк! ❤️', true);
                }, 500);
            }
        });
        
        // Поделиться
        document.querySelector('.share-btn').addEventListener('click', shareStream);
        
        // Управление камерой
        document.getElementById('toggle-camera').addEventListener('click', async () => {
            cameraActive = !cameraActive;
            const btn = document.getElementById('toggle-camera');
            btn.textContent = cameraActive ? '📷 Камера' : '📷❌ Камера выкл';
            await initCamera();
        });
        
        // Управление микрофоном
        document.getElementById('toggle-mic').addEventListener('click', async () => {
            micActive = !micActive;
            const btn = document.getElementById('toggle-mic');
            btn.textContent = micActive ? '🎤 Микрофон' : '🎤❌ Микрофон выкл';
            await initCamera();
        });
        
        // Настройки качества
        document.getElementById('quality-settings').addEventListener('click', showQualityMenu);
        
        // Завершение стрима
        document.getElementById('end-stream').addEventListener('click', () => {
            if (confirm('Завершить стрим? Статистика будет сохранена.')) {
                endStream();
            }
        });
        
        // Обработка ошибок медиа
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .catch(err => {
                console.warn('Медиаустройства не доступны, работаем в демо-режиме');
                showPlaceholder();
            });
        
        // Защита от случайного закрытия страницы
        window.addEventListener('beforeunload', (e) => {
            if (streamActive) {
                e.preventDefault();
                e.returnValue = 'Стрим ещё идёт. Вы уверены, что хотите закрыть страницу?';
            }
        });
        
        // Клик по комментариям (для интерактива)
        document.querySelector('.comments').addEventListener('click', () => {
            if (Math.random() > 0.7) {
                addComment('👤 Гость', 'Классный стрим!', false);
            }
        });
        
        console.log('🚀 Сайт "Одиночный TikTok" успешно загружен!');
    </script>
</body>
</html>
